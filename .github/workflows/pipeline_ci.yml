name: pipeline-ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install -r requirements-dev.txt
      - name: Format (black)
        run: |
          # Avoid emoji/noisy output from Black while still enforcing formatting.
          python -m black --quiet .
          git diff --name-only --exit-code
      - name: Lint (ruff)
        run: python -m ruff check .
      - name: Typecheck (mypy)
        run: python -m mypy .
      - name: Tests (pytest)
        run: python -m pytest

  demo:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - name: Run one-command demo
        run: |
          make demo
